name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci || npm i
      - name: Start + smoke
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          JWT_SECRET: "changeme-super-secret-key-1234"
          NODE_ENV: "test"
          PORT: "3000"
        run: |
          node src/server.js &
          sleep 1
          curl -f http://127.0.0.1:3000/health

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm i
      - name: Build
        env:
          VITE_API_URL: "http://localhost:3000"
        run: npm run build
