name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '18'

jobs:
  lint_and_test_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (backend)
        run: npm install
        working-directory: ./backend

      - name: Run lint (backend)
        run: npm run lint || true # Allow lint to fail without stopping the workflow if not configured
        working-directory: ./backend

      - name: Run tests (backend)
        run: npm test
        working-directory: ./backend

  lint_and_test_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (frontend)
        run: npm install
        working-directory: ./frontend

      - name: Run lint (frontend)
        run: npm run lint || true # Allow lint to fail without stopping the workflow if not configured
        working-directory: ./frontend

      - name: Run tests (frontend)
        run: npm test
        working-directory: ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [lint_and_test_backend, lint_and_test_frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway deploy --service claunnetworking_railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
