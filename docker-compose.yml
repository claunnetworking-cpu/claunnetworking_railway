version: "3.9"

# ClaunNetworking v5.3.0 — Docker Compose unificado
# Sobe tudo com: docker compose up --build
# Para produção adicione: --env-file .env

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-claunnetworking}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  # ─── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-production}
      PORT:        3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-claunnetworking}
      JWT_SECRET:  ${JWT_SECRET:-changeme-super-secret-key-please-change-in-prod}
      LOG_LEVEL:   ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX:       300
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_DEFAULT_TENANT_ID: ${VITE_DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:3000"

volumes:
  pg_data:

